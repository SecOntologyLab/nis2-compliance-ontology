<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="640" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1a2e44">Figure 1: L3CE Regulatory Framework Ontology — Civilian Scope</text>
  <text x="450" y="48" text-anchor="middle" font-size="10" fill="#6b7280">RDF/OWL · W3C Semantic Web Standards · Developed by L3CE</text>

  <!-- ═══════════════════════════════════════════════
       LAYER BANDS (top to bottom: general → specific)
  ════════════════════════════════════════════════ -->

  <!-- Layer 0: Top-level class -->
  <rect x="10" y="58" width="880" height="130" rx="8" fill="#fce8d5" opacity="0.5"/>
  <text x="22" y="74" font-size="9" font-weight="700" fill="#8b4513" letter-spacing="0.8">LAYER 1 · TOP-LEVEL CLASS</text>

  <!-- Layer 1: Regulatory groupings -->
  <rect x="10" y="198" width="880" height="130" rx="8" fill="#e6f4ea" opacity="0.5"/>
  <text x="22" y="214" font-size="9" font-weight="700" fill="#2d6a4f" letter-spacing="0.8">LAYER 2 · REGULATORY GROUPINGS</text>

  <!-- Layer 2: Specific instruments -->
  <rect x="10" y="338" width="880" height="200" rx="8" fill="#e8f0fe" opacity="0.5"/>
  <text x="22" y="354" font-size="9" font-weight="700" fill="#3a5a8a" letter-spacing="0.8">LAYER 3 · SPECIFIC EU REGULATORY INSTRUMENTS</text>

  <!-- ═══════════════════════════════════════════════
       NODE — LAYER 1: Regulatory Framework (TOP)
  ════════════════════════════════════════════════ -->
  <ellipse cx="450" cy="118" rx="105" ry="50" fill="#f0a070" stroke="#c05a20" stroke-width="3"/>
  <text x="450" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="white">Regulatory</text>
  <text x="450" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="white">Framework</text>
  <text x="450" y="146" text-anchor="middle" font-size="9" fill="#fff3e0">owl:Class · Top-level</text>

  <!-- ═══════════════════════════════════════════════
       NODES — LAYER 2: Groupings
  ════════════════════════════════════════════════ -->

  <!-- EU Regulations — cx=310 -->
  <circle cx="310" cy="268" r="52" fill="#5b9bd5" stroke="#2e6da4" stroke-width="2.5"/>
  <text x="310" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="white">EU</text>
  <text x="310" y="279" text-anchor="middle" font-size="11" font-weight="700" fill="white">Regulations</text>

  <!-- International Regulations (Civilian) — cx=680 -->
  <ellipse cx="680" cy="268" rx="90" ry="50" fill="#9b8fc4" stroke="#6b5fa0" stroke-width="2"/>
  <text x="680" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="white">International</text>
  <text x="680" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="white">Regulations</text>
  <text x="680" y="288" text-anchor="middle" font-size="9.5" fill="#e8e0ff">(Civilian)</text>

  <!-- ═══════════════════════════════════════════════
       NODES — LAYER 3: Specific instruments
  ════════════════════════════════════════════════ -->

  <!-- NIS2 Directive — cx=110 -->
  <circle cx="110" cy="448" r="48" fill="#5b9bd5" stroke="#2e6da4" stroke-width="2"/>
  <text x="110" y="444" text-anchor="middle" font-size="11" font-weight="700" fill="white">NIS2</text>
  <text x="110" y="459" text-anchor="middle" font-size="10" fill="white">Directive</text>

  <!-- EU AI Act — cx=260 -->
  <circle cx="260" cy="448" r="48" fill="#4bacc6" stroke="#1f7a9a" stroke-width="2"/>
  <text x="260" y="444" text-anchor="middle" font-size="11" font-weight="700" fill="white">EU AI</text>
  <text x="260" y="459" text-anchor="middle" font-size="10" fill="white">Act</text>

  <!-- CER Directive — cx=410 -->
  <circle cx="410" cy="448" r="48" fill="#e07b54" stroke="#b85c32" stroke-width="2"/>
  <text x="410" y="444" text-anchor="middle" font-size="11" font-weight="700" fill="white">CER</text>
  <text x="410" y="459" text-anchor="middle" font-size="10" fill="white">Directive</text>

  <!-- GDPR — cx=560 -->
  <circle cx="560" cy="448" r="48" fill="#70b8a8" stroke="#3d8b78" stroke-width="2"/>
  <text x="560" y="448" text-anchor="middle" font-size="11" font-weight="700" fill="white">GDPR</text>

  <!-- DORA — cx=710 -->
  <circle cx="710" cy="448" r="48" fill="#7aba6e" stroke="#4a8a3d" stroke-width="2"/>
  <text x="710" y="448" text-anchor="middle" font-size="11" font-weight="700" fill="white">DORA</text>

  <!-- ═══════════════════════════════════════════════
       EDGES — Layer 2 groupings → Regulatory Framework
       (subClassOf: arrows point UP to parent)
  ════════════════════════════════════════════════ -->

  <!-- EU Regulations → Regulatory Framework -->
  <path d="M 335 220 Q 380 175 398 165" stroke="#c05a20" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="342" y="188" font-size="8.5" fill="#c05a20" transform="rotate(-38,342,188)">subClassOf</text>

  <!-- International Civilian → Regulatory Framework -->
  <path d="M 614 238 Q 560 185 505 162" stroke="#c05a20" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="548" y="192" font-size="8.5" fill="#c05a20" transform="rotate(38,548,192)">subClassOf</text>

  <!-- ═══════════════════════════════════════════════
       EDGES — Specific instruments → EU Regulations
       (subClassOf arrows point UP to parent)
  ════════════════════════════════════════════════ -->

  <!-- NIS2 → EU Regulations -->
  <path d="M 137 403 Q 200 340 268 314" stroke="#3a6ea8" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="176" y="356" font-size="8.5" fill="#3a6ea8" transform="rotate(-38,176,356)">subClassOf</text>

  <!-- EU AI Act → EU Regulations -->
  <path d="M 264 400 Q 278 360 294 316" stroke="#3a6ea8" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="258" y="356" font-size="8.5" fill="#3a6ea8" transform="rotate(-15,258,356)">subClassOf</text>

  <!-- CER → EU Regulations -->
  <path d="M 378 402 Q 355 360 332 316" stroke="#3a6ea8" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="338" y="354" font-size="8.5" fill="#3a6ea8" transform="rotate(20,338,354)">subClassOf</text>

  <!-- GDPR → EU Regulations -->
  <path d="M 522 405 Q 450 360 358 310" stroke="#3a6ea8" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="428" y="352" font-size="8.5" fill="#3a6ea8" transform="rotate(30,428,352)">subClassOf</text>

  <!-- DORA → EU Regulations -->
  <path d="M 672 405 Q 550 370 364 308" stroke="#3a6ea8" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="510" y="366" font-size="8.5" fill="#3a6ea8" transform="rotate(20,510,366)">subClassOf</text>

  <!-- GDPR → International Civilian (also) -->
  <path d="M 595 412 Q 640 360 666 318" stroke="#6b5fa0" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="642" y="360" font-size="8" fill="#6b5fa0" transform="rotate(-50,642,360)">subClassOf</text>

  <!-- ═══════════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════════ -->
  <rect x="10" y="558" width="880" height="72" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>

  <text x="26" y="576" font-size="9" font-weight="700" fill="#444">Legend:</text>

  <line x1="80" y1="573" x2="118" y2="573" stroke="#3a6ea8" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="123" y="577" font-size="9" fill="#333">subClassOf (EU regulatory hierarchy)</text>

  <line x1="340" y1="573" x2="378" y2="573" stroke="#6b5fa0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="383" y="577" font-size="9" fill="#333">subClassOf (cross-domain, civilian)</text>

  <line x1="590" y1="573" x2="628" y2="573" stroke="#c05a20" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="633" y="577" font-size="9" fill="#333">subClassOf (grouping → top-level)</text>

  <!-- Colour key row 2 -->
  <circle cx="36" cy="598" r="7" fill="#f0a070"/>
  <text x="48" y="602" font-size="9" fill="#333">Top-level Class</text>
  <circle cx="160" cy="598" r="7" fill="#5b9bd5"/>
  <text x="172" y="602" font-size="9" fill="#333">EU Instruments</text>
  <circle cx="280" cy="598" r="7" fill="#9b8fc4"/>
  <text x="292" y="602" font-size="9" fill="#333">International (Civilian)</text>

  <text x="440" y="602" font-size="8.5" fill="#6b7280" font-style="italic">Note: Defence/military nodes excluded per CYberSynchrony Call 2 civilian scope requirement.</text>

  <!-- ═══════════════════════════════════════════════
       ARROWHEAD MARKERS
  ════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c05a20"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b5fa0"/>
    </marker>
  </defs>

</svg>
